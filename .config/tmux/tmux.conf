# Allow mouse usage
set -g mouse on

# Set clipboard to use
set -g set-clipboard external
set -g copy-command wl-copy

# Set vi-like copy mode keymaps
set -g mode-keys vi

# Set emacs-like status keymaps
set -g status-keys emacs

# Always start counting from 1, not 0
set -g base-index 1
set -g pane-base-index 1

# Don't allow programs to change window name
set -g allow-rename off
set -g automatic-rename off

# Unset default prefix key
unbind C-b

# Set my prefix key
set -g prefix F1

# Send prefix key to underlying process
bind F1 send-prefix

# Set my global keymaps
bind -n M-PgUp copy-mode
bind -n M-PgDn paste-buffer -p
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-[ previous-window
bind -n M-] next-window
bind -n M-\{ swap-window -t -1
bind -n M-\} swap-window -t +1
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-R source-file ~/.config/tmux/tmux.conf
bind -n M-r command-prompt -I "#W" "rename-window -- '%%'"
bind -n M-w command-prompt "new-window -n '%%' -c '#{pane_current_path}'"
bind -n M-h split-window -h -c "#{pane_current_path}"
bind -n M-v split-window -v -c "#{pane_current_path}"
bind -n M-j choose-window "join-pane -h -s '%%'"
bind -n M-b break-pane
bind -n M-l next-layout
bind -n M-x kill-pane
bind -n M-X kill-window
bind -n M-z resize-pane -Z
bind -n M-d detach-client
bind -n M-s command-prompt "new-session -A -s '%%'"
bind -n M-o choose-tree -Z
bind -n M-: command-prompt
bind -n M-p run -b "#{@fingers-cli} start #{pane_id}"
# FIXME: not working
# bind -n M-c run "tmux capture-pane -p -S - | $EDITOR -"

# Set copy mode keymaps
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X begin-selection \; send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel

# Don't copy after text is selected with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Copy selected text with right mouse click
bind -T copy-mode-vi MouseDown3Pane send -X copy-pipe-and-cancel

# Add plugins
set -g @plugin 'niksingh710/minimal-tmux-status#f3096808cfca41007eacc76a686004ab6a394a0e'
set -g @plugin 'Morantron/tmux-fingers#fc3c750b8d73ac3e29675aae3b3ac6a00a0718f1'
set -g @plugin 'tmux-plugins/tmux-resurrect#cff343cf9e81983d3da0c8562b01616f12e8d548'
set -g @plugin 'tmux-plugins/tmux-continuum#0698e8f4b17d6454c71bf5212895ec055c578da0'

# Configure plugins
set -g @minimal-tmux-justify left
set -g @minimal-tmux-left false
set -g @fingers-alt-action ':paste:'
set -g @continuum-boot 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'nvim vim vi git ssh'

# Run package manager
run 'tpack init'
