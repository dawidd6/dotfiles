set -g allow-passthrough on
set -g base-index 1
set -g copy-command wl-copy
set -g detach-on-destroy off
set -g display-time 3000
set -g escape-time 1
set -g focus-events on
set -g history-limit 10000
set -g mode-keys vi
set -g mouse on
set -g pane-base-index 1
set -g prefix None
set -g renumber-windows on
set -g set-clipboard external
set -g status-interval 2
set -g status-keys emacs

set -g status-left-length 50
set -g status-right-length 50
set -g status-left '[#{=20:session_name}] '
set -g status-right ' "#{=20:pane_title}" W:#{session_windows} S:#{server_sessions}'
set -g status-style fg=default,bg=default,dim
set -g window-status-current-style fg=default,bg=default,nodim
set -g pane-border-indicators both

set -gF @config_file '#{current_file}'

unbind C-b
unbind -n MouseDown3Pane
unbind -n MouseDown3Status
unbind -n MouseDown3Border
unbind -T copy-mode-vi MouseDragEnd1Pane

bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi Y send -X copy-pipe-end-of-line-and-cancel
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X begin-selection \; send -X rectangle-toggle
bind -T copy-mode-vi Escape if -F '#{selection_active}' {send -X clear-selection} {send -X cancel}
bind -T copy-mode-vi MouseDown3Pane send -X copy-pipe-and-cancel
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line
bind -n DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send -M } { copy-mode ; send -X select-word }
bind -n TripleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send -M } { copy-mode ; send -X select-line }
bind -n PgUp if -F '#{==:#{pane_current_command},#{b:default-shell}}' { copy-mode } { send PgUp }
bind -n M-PgUp copy-mode
bind -n M-PgDn paste-buffer -p
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-a last-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10
bind -n M-, swap-pane -U
bind -n M-. swap-pane -D
bind -n M-[ previous-window
bind -n M-] next-window
bind -n M-\{ switch-client -p
bind -n M-\} switch-client -n
bind -n M-< swap-window -t -1 \; previous-window
bind -n M-> swap-window -t +1 \; next-window
bind -n M-s command-prompt 'new-session -A -s "%%"'
bind -n M-w new-window -c '#{pane_current_path}'
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-h split-window -v -c "#{pane_current_path}"
bind -n M-j choose-window 'join-pane -h -s "%%"'
bind -n M-b break-pane
bind -n M-z resize-pane -Z
bind -n M-l next-layout
bind -n M-d detach-client
bind -n M-o choose-tree -Zw
bind -n M-: command-prompt
bind -n M-p run -b 'tmux-fingers start #{pane_id}'
bind -n M-g popup -E -w 90% -h 90% 'tmux capture-pane -p -J -S - | nvim -R -'
bind -n M-q kill-window
bind -n M-Q kill-server
bind -n M-R source -F '#{@config_file}' \; display "Reloaded #{@config_file}"

set -g @fingers-alt-action :paste:
set -g @fingers-hint-position right
set -g @fingers-enable-bindings 0
set -g @fingers-backdrop-style dim
set -g @fingers-pattern-0 'HOMEBREW_[A-Z_=0-9]+ (?<match>.+)'
set -g @fingers-pattern-1 '➜  (?<match>.{10,}\S)'

run 'tmux-fingers load-config'
