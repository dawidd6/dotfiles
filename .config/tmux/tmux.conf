set -g base-index 1
set -g copy-command wl-copy
set -g detach-on-destroy off
set -g escape-time 1
set -g focus-events on
set -g history-limit 10000
set -g mode-keys vi
set -g mouse on
set -g pane-base-index 1
set -g prefix None
set -g renumber-windows on
set -g set-clipboard external
set -g status-interval 2
set -g status-keys emacs

set -g status-right '"#{=20:pane_title}" W:#{session_windows} S:#{server_sessions}'
set -g status-style "fg=default,bg=default,dim"

unbind -a
unbind -T copy-mode-vi MouseDragEnd1Pane

bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X begin-selection \; send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi MouseDown3Pane send -X copy-pipe-and-cancel
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line
bind -n DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send -M } { copy-mode -H ; send -X select-word }
bind -n TripleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send -M } { copy-mode -H ; send -X select-line }
bind -n M-PgUp copy-mode
bind -n M-PgDn paste-buffer -p
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-< swap-pane -U
bind -n M-> swap-pane -D
bind -n M-[ previous-window
bind -n M-] next-window
bind -n M-s new-session -A -s '%%'
bind -n M-w new-window -c '#{pane_current_path}'
bind -n M-h split-window -h -c "#{pane_current_path}"
bind -n M-v split-window -v -c "#{pane_current_path}"
bind -n M-j choose-window "join-pane -h -s '%%'"
bind -n M-b break-pane
bind -n M-z resize-pane -Z
bind -n M-l next-layout
bind -n M-x kill-pane
bind -n M-X kill-window
bind -n M-k kill-server
bind -n M-d detach-client
bind -n M-o choose-tree -Zw
bind -n M-: command-prompt
bind -n M-p run -b "#{@fingers-cli} start #{pane_id}"
bind -n M-f run -b "~/.config/tmux/plugins/tmux-fzf/main.sh"
bind -n M-r source "~/.config/tmux/tmux.conf" \; display "Reloaded config"

set -g @plugin "tmux-plugins/tmux-resurrect#cff343cf9e81983d3da0c8562b01616f12e8d548"
set -g @plugin "tmux-plugins/tmux-continuum#0698e8f4b17d6454c71bf5212895ec055c578da0"
set -g @plugin "Morantron/tmux-fingers#fc3c750b8d73ac3e29675aae3b3ac6a00a0718f1"
set -g @plugin "sainnhe/tmux-fzf#05af76daa2487575b93a4f604693b00969f19c2f"

set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"
set -g @continuum-save-interval "10"
set -g @fingers-alt-action ":paste:"
set -g @fingers-hint-position "right"
set -g @fingers-pattern-0 'HOMEBREW_[A-Z_=0-9]+ (?<match>.+)'

run "tpack init"
