name: Setup Ubuntu

on:
  push:
    branches:
      - master
    paths:
      - .local/bin/setup-ubuntu
      - .github/workflows/setup-ubuntu.yml
  workflow_dispatch:

jobs:
  setup-ubuntu:
    runs-on: ubuntu-${{ matrix.ubuntu_release }}
    strategy:
      matrix:
        ubuntu_release:
          - "26.04"
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Install incus
      run: |
        sudo apt update
        sudo apt install -y incus

    - name: Initialize incus
      run: |
        sudo incus admin init --auto

    - name: Run Ubuntu VM
      run: |
        sudo incus launch --vm -c limits.cpu=2 -c limits.memory=2GiB -d root,size=50GiB images:ubuntu/${{ matrix.ubuntu_release }}/desktop vm

    - name: Wait for VM to be running
      run: |
        sudo incus exec vm -- systemctl is-system-running --wait

    - name: TODO
      run: |
        sudo incus exec vm -- sudo apt update
